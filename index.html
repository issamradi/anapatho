<style>
:root{
  --font-sans: Inter, Arial, sans-serif;

  --color-text-primary:#f5f5f5;
  --color-text-secondary:#bdbdbd;
  --color-text-tertiary:#8a8a8a;

  --color-background-primary:#1e1e1e;
  --color-background-secondary:#2a2a2a;

  --color-border-primary:#555;
  --color-border-secondary:#444;
  --color-border-tertiary:#3a3a3a;

  --border-radius-md:10px;
  --border-radius-lg:16px;
}

body{
  background:#121212;
  margin:0;
  padding:24px;
  font-family: var(--font-sans);
}
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0; max-width: 800px; margin: 0 auto;}
.header{padding:1rem 1.25rem;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);margin-bottom:1.25rem}
.header h1{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.header p{font-size:12px;color:var(--color-text-secondary)}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.tab{font-size:12px;padding:5px 11px;border:0.5px solid var(--color-border-tertiary);border-radius:20px;background:transparent;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;transition:all .15s}
.tab:hover{border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.tab.on{border-color:var(--color-border-primary);color:var(--color-text-primary);font-weight:500;background:var(--color-background-secondary)}
.spacer{flex:1}
.btn-reset{font-size:12px;padding:5px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.btn-reset:hover{color:var(--color-text-primary);border-color:var(--color-border-secondary)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;text-align:center}
.stat-v{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-l{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-sq{width:12px;height:12px;border-radius:2px}
.q{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:.875rem}
.q.done{border-color:var(--color-border-secondary)}
.qmeta{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.qn{font-size:11px;color:var(--color-text-secondary);font-weight:500}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.b-sein{background:#EEEDFE;color:#3C3489}
.b-hepatique{background:#E1F5EE;color:#085041}
.b-colorectal{background:#FAEEDA;color:#633806}
.b-poumon{background:#E6F1FB;color:#0C447C}
.b-ovaire{background:#FBEAF0;color:#72243E}
.b-polype{background:#FAECE7;color:#712B13}
.b-year{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.b-qcu{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.qtxt{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.6;margin-bottom:12px}
.qnote{font-size:12px;color:var(--color-text-secondary);font-style:italic;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.opt-label{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:background .1s,border-color .1s;user-select:none}
.opt-label:hover{background:var(--color-background-secondary)}
.opt-label input[type=checkbox],.opt-label input[type=radio]{display:none}
.custom-cb{width:18px;height:18px;min-width:18px;border-radius:3px;border:0.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;background:var(--color-background-primary)}
.opt-label.sel .custom-cb{background:var(--color-text-primary);border-color:var(--color-text-primary)}
.opt-label.sel .custom-cb::after{content:'';display:block;width:5px;height:9px;border:1.5px solid var(--color-background-primary);border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.opt-label.correct{ background:#EAF3DE; border-color:#639922; color:#111;}
.opt-label.correct .custom-cb{background:#639922;border-color:#639922}
.opt-label.correct .custom-cb::after{content:'';display:block;width:5px;height:9px;border:1.5px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.opt-label.wrong{ background:#FCEBEB; border-color:#E24B4A; color:#111;}
.opt-label.wrong .custom-cb{background:#E24B4A;border-color:#E24B4A}
.opt-label.wrong .custom-cb::after{content:'✗';color:white;font-size:11px;font-style:normal;line-height:1}
.opt-label.missed{ background:#FAEEDA; border-color:#BA7517; color:#111;}
.opt-label.missed .custom-cb{background:#BA7517;border-color:#BA7517}
.opt-label.missed .custom-cb::after{content:'✓';color:white;font-size:11px;line-height:1}
.opt-letter{font-size:12px;color:var(--color-text-secondary);min-width:14px;margin-top:1px}
.opt-label.sel .opt-letter,.opt-label.correct .opt-letter,.opt-label.wrong .opt-letter,.opt-label.missed .opt-letter{color:inherit}
.opt-text{ font-size:13px; color:#f5f5f5; line-height:1.5 }
.opt-label.correct .opt-text, .opt-label.wrong .opt-text, .opt-label.missed .opt-text{ color:#111; }
.btn-check{width:100%;padding:9px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;transition:all .12s}
.btn-check:hover{background:var(--color-background-primary);border-color:var(--color-border-primary)}
.btn-check:disabled{opacity:.4;cursor:not-allowed}
.fb{font-size:12px;padding:8px 12px;border-radius:var(--border-radius-md);margin-top:8px;line-height:1.5}
.fb.ok{background:#EAF3DE;color:#27500A}
.fb.nok{background:#FCEBEB;color:#791F1F}
</style>

const LABELS={sein:'Cancer du sein',hepatique:'Tumeurs hépatiques',colorectal:'Cancer colorectal',poumon:'Cancer du poumon',ovaire:'Tumeur de l\'ovaire',polype:'Polype / Polypose'};
let sel={};
let checked={};
let activeTopic='all';

document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',function(){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  this.classList.add('on');
  activeTopic=this.dataset.t;
  render();
  updateStats();
}));

function getVisible(){return activeTopic==='all'?QS:QS.filter(q=>q.t===activeTopic);}

function updateStats(){
  const vis=getVisible();
  const done=vis.filter(q=>checked[q.id]).length;
  let correct=0;
  vis.forEach(q=>{
    if(!checked[q.id]) return;
    const s=[...(sel[q.id]||new Set())].sort().join();
    const a=[...q.a].sort().join();
    if(s===a) correct++;
  });
  document.getElementById('sv-total').textContent=vis.length;
  document.getElementById('sv-done').textContent=done;
  document.getElementById('sv-score').textContent=done>0?Math.round(correct/done*100)+'%':'—';
}

function toggle(qid,idx){
  if(checked[qid]) return;
  const q=QS.find(x=>x.id===qid);
  if(!sel[qid]) sel[qid]=new Set();
  if(q.tp==='qcu'){
    sel[qid]=new Set([idx]);
  } else {
    sel[qid].has(idx)?sel[qid].delete(idx):sel[qid].add(idx);
  }
  renderCard(qid);
}

function verify(qid){
  if(!sel[qid]||sel[qid].size===0) return;
  checked[qid]=true;
  renderCard(qid);
  updateStats();
}

function renderCard(qid){
  const q=QS.find(x=>x.id===qid);
  const el=document.getElementById('qcard-'+qid);
  if(!el) return;
  const s=sel[qid]||new Set();
  const ch=checked[qid];
  const ansSet=new Set(q.a);

  const optsHtml=q.o.map((txt,i)=>{
    const letter=String.fromCharCode(65+i);
    const isSel=s.has(i);
    const isAns=ansSet.has(i);
    let cls='opt-label';
    if(ch){
      if(isSel&&isAns) cls='opt-label correct';
      else if(isSel&&!isAns) cls='opt-label wrong';
      else if(!isSel&&isAns) cls='opt-label missed';
    } else if(isSel) cls='opt-label sel';
    return `<label class="${cls}" onclick="toggle(${qid},${i})">
      <div class="custom-cb"></div>
      <span class="opt-letter">${letter}.</span>
      <span class="opt-text">${txt}</span>
    </label>`;
  }).join('');

  let fb='';
  if(ch){
    const selArr=[...s].sort().join();
    const ansArr=[...q.a].sort().join();
    if(selArr===ansArr){
      fb=`<div class="fb ok">✔ Parfait — toutes les bonnes réponses !</div>`;
    } else {
      const letters=q.a.map(i=>String.fromCharCode(65+i)).join(', ');
      fb=`<div class="fb nok">✖ Réponses correctes : <strong>${letters}</strong></div>`;
    }
  }

  el.className='q'+(ch?' done':'');
  el.innerHTML=`
    <div class="qmeta">
      <span class="qn">${q.examQ || ("Q"+q.id)}</span>

      <span class="badge b-${q.t}">${LABELS[q.t]}</span>
      ${q.tp==='qcu'?'<span class="badge b-qcu">QCU</span>':''}
      <span class="badge b-year">${q.y}</span>
    </div>
    <div class="qtxt">${q.tx}</div>
    <div class="opts">${optsHtml}</div>
    ${!ch?`<button class="btn-check" onclick="verify(${qid})" ${s.size===0?'disabled':''}>Vérifier ma réponse</button>`:''}
    ${fb}
  `;
}

function render(){
  const container=document.getElementById('qlist');
  container.innerHTML='';
  getVisible().forEach(q=>{
    const d=document.createElement('div');
    d.id='qcard-'+q.id;
    container.appendChild(d);
    renderCard(q.id);
  });
}

function resetAll(){
  sel={};checked={};
  render();updateStats();
}

render();updateStats();
</script>
